<svg width="207" height="199" viewBox="116 93 207 199" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Velucid icon</title>
  <defs>
    <g id="icon">

      <!-- RIGHT ARM DASHES — original positions, chips scaled up from 14x16 to 20x22 -->
      <polygon points="74,-97  52,-97  46,-83  68,-83" fill="currentColor" opacity="0.35"/>
      <polygon points="65,-76  43,-76  37,-62  59,-62" fill="currentColor" opacity="0.35"/>
      <polygon points="56,-55  34,-55  28,-41  50,-41" fill="currentColor" opacity="0.35"/>
      <polygon points="47,-34  25,-34  19,-20  41,-20" fill="currentColor" opacity="0.35"/>
      <polygon points="38,-13  16,-13  10,1    32,1"   fill="currentColor" opacity="0.35"/>
      <polygon points="29,8    7,8     1,22    23,22"  fill="currentColor" opacity="0.35"/>
      <polygon points="20,29  -2,29   -8,43   14,43"  fill="currentColor" opacity="0.35"/>

      <!-- TICKS — same angle, just taller (h=10 instead of 6) -->
      <polygon points="-116,-105 -76,-105 -72.6,-95 -112.6,-95" fill="currentColor" opacity="0.6"/>
      <polygon points="-85.3,-28 -41.3,-28 -37.9,-18 -81.9,-18" fill="currentColor" opacity="0.6"/>

      <!-- LEFT ARM — original shape, halfW bumped from 10 to 15 -->
      <polygon points="-83,-105 -53,-105 15,50 -15,50" fill="currentColor"/>

      <!-- DECISION POINT — ring r=20→24, stroke 6→9, dot r=7→10 -->
      <circle cx="0" cy="50" r="24" fill="currentColor"/>
      <circle cx="0" cy="50" r="15" fill="white"/>
      <circle cx="0" cy="50" r="10" fill="currentColor"/>

    </g>
  </defs>

  <use href="#icon" transform="translate(240,210)"/>
</svg>

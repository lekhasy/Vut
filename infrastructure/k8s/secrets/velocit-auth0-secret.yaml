# Auth0 credentials for the Velucid platform
#
# To generate base64 values:
#   echo -n 'dev-velucid.us.auth0.com' | base64
#
# IMPORTANT: Replace these values with your actual Auth0 tenant configuration.
# Consider using Sealed Secrets or a secrets manager for non-dev environments.

apiVersion: v1
kind: Secret
metadata:
  name: velucid-auth0-secret
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  domain: "dev-velucid.us.auth0.com"
  audience: "https://api.velucid.dev"
  client-id: "YOUR_DEV_CLIENT_ID"
  client-secret: "YOUR_DEV_CLIENT_SECRET"

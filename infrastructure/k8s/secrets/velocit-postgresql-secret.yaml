# PostgreSQL credentials for the Velucid platform
#
# To generate base64 values:
#   echo -n 'velucid_app' | base64
#   echo -n 'your_secure_password' | base64
#
# Dev defaults (for local K3s):
#   username: velucid_app   -> dmVsb2NpdF9hcHA=
#   password: velucid_dev_password -> dmVsb2NpdF9kZXZfcGFzc3dvcmQ=
#
# IMPORTANT: Replace these values for staging and production.
# Consider using Sealed Secrets or a secrets manager.

apiVersion: v1
kind: Secret
metadata:
  name: velucid-postgresql-secret
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: postgresql
type: Opaque
stringData:
  username: velucid_app
  password: velucid_dev_password
  # base64 alternatives (uncomment and use 'data:' instead of 'stringData:' for strict base64):
  # data:
  #   username: dmVsb2NpdF9hcHA=
  #   password: dmVsb2NpdF9kZXZfcGFzc3dvcmQ=

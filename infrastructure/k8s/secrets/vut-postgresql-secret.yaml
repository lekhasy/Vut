# PostgreSQL credentials for the VUT platform
#
# To generate base64 values:
#   echo -n 'vut_app' | base64
#   echo -n 'your_secure_password' | base64
#
# Dev defaults (for local K3s):
#   username: vut_app   -> dnd0X2FwcA==
#   password: vut_dev_password -> dnd0X2Rldl9wYXNzd29yZA==
#
# IMPORTANT: Replace these values for staging and production.
# Consider using Sealed Secrets or a secrets manager.

apiVersion: v1
kind: Secret
metadata:
  name: vut-postgresql-secret
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: postgresql
type: Opaque
stringData:
  username: vut_app
  password: vut_dev_password
  # base64 alternatives (uncomment and use 'data:' instead of 'stringData:' for strict base64):
  # data:
  #   username: dnd0X2FwcA==
  #   password: dnd0X2Rldl9wYXNzd29yZA==

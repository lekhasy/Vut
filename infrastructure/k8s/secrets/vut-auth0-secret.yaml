# Auth0 credentials for the VUT platform
#
# To generate base64 values:
#   echo -n 'dev-vut.us.auth0.com' | base64
#
# IMPORTANT: Replace these values with your actual Auth0 tenant configuration.
# Consider using Sealed Secrets or a secrets manager for non-dev environments.

apiVersion: v1
kind: Secret
metadata:
  name: vut-auth0-secret
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: auth
type: Opaque
stringData:
  domain: "dev-vut.us.auth0.com"
  audience: "https://api.vut.dev"
  client-id: "YOUR_DEV_CLIENT_ID"
  client-secret: "YOUR_DEV_CLIENT_SECRET"

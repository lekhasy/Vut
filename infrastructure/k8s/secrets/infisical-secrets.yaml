# Infisical secret sync — pulls secrets from Infisical Cloud and creates
# K8s secrets in the velucid namespace automatically.
#
# Prerequisites:
#   1. Infisical Operator installed in K3s (done by k3s-start.sh)
#   2. Machine Identity credentials stored in K8s:
#      sudo k3s kubectl create secret generic infisical-machine-identity \
#        -n velucid \
#        --from-literal=clientId=<YOUR_MACHINE_IDENTITY_CLIENT_ID> \
#        --from-literal=clientSecret=<YOUR_MACHINE_IDENTITY_CLIENT_SECRET>
#
# Expected Infisical secret keys (Production environment, root path /):
#   AUTH0_DOMAIN, AUTH0_AUDIENCE, AUTH0_CLIENT_ID, AUTH0_CLIENT_SECRET,
#   POSTGRES_USERNAME, POSTGRES_PASSWORD,
#   RESEND_API_KEY

---
# Auth0 secrets → velucid-auth0-secret
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: infisical-auth0
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: secrets
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: velucid
      secretsScope:
        projectSlug: velucid-8i-fk
        envSlug: prod
        secretsPath: /
  managedSecretReference:
    secretName: velucid-auth0-secret
    secretNamespace: velucid
    secretType: Opaque
    creationPolicy: Owner


# Resend API credentials for the VUT platform (email delivery)
#
# To get your API key:
#   1. Sign up at https://resend.com
#   2. Go to API Keys → Create API Key
#   3. Replace the placeholder below with your actual key
#
# IMPORTANT: Replace placeholder with your actual Resend API key.
# Consider using Sealed Secrets or a secrets manager for non-dev environments.

apiVersion: v1
kind: Secret
metadata:
  name: vut-resend-secret
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: email
type: Opaque
stringData:
  api-key: "YOUR_DEV_RESEND_API_KEY"

# Cloudflare Tunnel credentials
# Replace <BASE64_TUNNEL_CREDENTIALS_JSON> with the base64-encoded contents
# of ~/.cloudflared/<TUNNEL_ID>.json after running:
#   cloudflared tunnel create vut
#   cat ~/.cloudflared/<TUNNEL_ID>.json | base64
apiVersion: v1
kind: Secret
metadata:
  name: cloudflared-tunnel-credentials
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: tunnel
    app.kubernetes.io/name: cloudflared
type: Opaque
data:
  credentials.json: <BASE64_TUNNEL_CREDENTIALS_JSON>

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vut-ingress
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: ingress
spec:
  ingressClassName: traefik
  rules:
    - host: vut.app
      http:
        paths:
          # API routes -> Silo (Orleans co-hosted HTTP API)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: vut-silo
                port:
                  number: 5000
          # Auth routes -> Frontend (handles Auth0 callbacks)
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: vut-frontend
                port:
                  number: 3000
          # Everything else -> Frontend (Astro.js SSR)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vut-frontend
                port:
                  number: 3000

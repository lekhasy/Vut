apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: orleans-hosting
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "watch", "list", "delete", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: orleans-hosting-binding
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
subjects:
  - kind: ServiceAccount
    name: default
    apiGroup: ""
roleRef:
  kind: Role
  name: orleans-hosting
  apiGroup: rbac.authorization.k8s.io

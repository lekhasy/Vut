apiVersion: apps/v1
kind: Deployment
metadata:
  name: velucid-silo
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: backend
    app.kubernetes.io/name: silo
    orleans/serviceId: velucid
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 2
  revisionHistoryLimit: 2
  minReadySeconds: 60
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: velucid
      app.kubernetes.io/component: backend
      app.kubernetes.io/name: silo
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: velucid
        app.kubernetes.io/component: backend
        app.kubernetes.io/name: silo
        orleans/serviceId: velucid
        orleans/clusterId: velucid-cluster
    spec:
      terminationGracePeriodSeconds: 180
      containers:
        - name: silo
          image: ghcr.io/lekhasy/vut/silo:0fb91fc
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
            - name: silo
              containerPort: 11111
              protocol: TCP
            - name: gateway
              containerPort: 30000
              protocol: TCP
            - name: orleans-dash
              containerPort: 8888
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"
            - name: DOTNET_SHUTDOWNTIMEOUTSECONDS
              value: "120"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: ORLEANS_SERVICE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['orleans/serviceId']
            - name: ORLEANS_CLUSTER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.labels['orleans/clusterId']
            - name: KurrentDb__ConnectionString
              value: "esdb://velucid-kurrentdb:2113?tls=false"
            - name: Redis__ConnectionString
              value: "velucid-redis:6379"
            - name: POSTGRES_USERNAME
              valueFrom:
                secretKeyRef:
                  name: velucid-postgresql-secret
                  key: POSTGRES_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velucid-postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: ConnectionStrings__PostgreSQL
              value: "Host=velucid-postgresql;Database=velucid_readmodel;Username=$(POSTGRES_USERNAME);Password=$(POSTGRES_PASSWORD)"
            - name: Auth0__Domain
              valueFrom:
                secretKeyRef:
                  name: velucid-auth0-secret
                  key: AUTH0_DOMAIN
            - name: Auth0__Audience
              valueFrom:
                secretKeyRef:
                  name: velucid-auth0-secret
                  key: AUTH0_AUDIENCE
            - name: Auth0__ClientId
              valueFrom:
                secretKeyRef:
                  name: velucid-auth0-secret
                  key: AUTH0_CLIENT_ID
            - name: Auth0__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: velucid-auth0-secret
                  key: AUTH0_CLIENT_SECRET
            - name: Resend__ApiKey
              valueFrom:
                secretKeyRef:
                  name: velucid-resend-secret
                  key: RESEND_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

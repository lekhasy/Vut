apiVersion: apps/v1
kind: Deployment
metadata:
  name: velucid-silo
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: backend
    app.kubernetes.io/name: silo
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: velucid
      app.kubernetes.io/component: backend
      app.kubernetes.io/name: silo
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: velucid
        app.kubernetes.io/component: backend
        app.kubernetes.io/name: silo
    spec:
      containers:
        - name: silo
          image: ghcr.io/lekhasy/vut/silo:e5e2018
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
              protocol: TCP
            - name: silo
              containerPort: 11111
              protocol: TCP
            - name: gateway
              containerPort: 30000
              protocol: TCP
            - name: orleans-dash
              containerPort: 8888
              protocol: TCP
          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "Development"
            - name: KurrentDb__ConnectionString
              value: "esdb://velucid-kurrentdb:2113?tls=false"
            - name: ConnectionStrings__PostgreSQL
              value: "Host=velucid-postgresql;Database=velucid_readmodel;Username=velucid_app;Password=velucid_dev_password"
            - name: Orleans__ClusterId
              value: "velucid-cluster"
            - name: Orleans__ServiceId
              value: "velucid"
            - name: Auth0__Domain
              valueFrom:
                secretKeyRef:
                  name: velucid-auth0-secret
                  key: AUTH0_DOMAIN
            - name: Auth0__Audience
              valueFrom:
                secretKeyRef:
                  name: velucid-auth0-secret
                  key: AUTH0_AUDIENCE
            - name: Auth0__ClientId
              valueFrom:
                secretKeyRef:
                  name: velucid-auth0-secret
                  key: AUTH0_CLIENT_ID
            - name: Auth0__ClientSecret
              valueFrom:
                secretKeyRef:
                  name: velucid-auth0-secret
                  key: AUTH0_CLIENT_SECRET
            - name: Resend__ApiKey
              valueFrom:
                secretKeyRef:
                  name: velucid-resend-secret
                  key: RESEND_API_KEY
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5000
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

apiVersion: apps/v1
kind: Deployment
metadata:
  name: vut-frontend
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: frontend
    app.kubernetes.io/name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/part-of: vut
      app.kubernetes.io/component: frontend
      app.kubernetes.io/name: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: vut
        app.kubernetes.io/component: frontend
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: vut/frontend:latest
          imagePullPolicy: Never  # For local dev (minikube/kind)
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: NODE_ENV
              value: "development"
            - name: ACTOR_SERVICE_URL
              value: "http://vut-actor-service:5000"
            - name: READMODEL_URL
              value: "http://vut-actor-service:5001"
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: vut-auth0-secret
                  key: domain
            - name: AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: vut-auth0-secret
                  key: audience
            - name: AUTH0_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: vut-auth0-secret
                  key: client-id
            - name: AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: vut-auth0-secret
                  key: client-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

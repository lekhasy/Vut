apiVersion: apps/v1
kind: Deployment
metadata:
  name: velucid-projector-service
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: projector
    app.kubernetes.io/name: projector-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: velucid
      app.kubernetes.io/component: projector
      app.kubernetes.io/name: projector-service
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: velucid
        app.kubernetes.io/component: projector
        app.kubernetes.io/name: projector-service
    spec:
      containers:
        - name: projector-service
          image: ghcr.io/lekhasy/vut/projector-service:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: KurrentDb__ConnectionString
              value: "esdb://velucid-kurrentdb:2113?tls=false"
            - name: ConnectionStrings__PostgreSQL
              value: "Host=velucid-postgresql;Database=velucid_readmodel;Username=velucid_app;Password=velucid_dev_password"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi

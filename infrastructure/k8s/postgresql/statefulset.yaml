apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vut-postgresql
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: database
    app.kubernetes.io/name: postgresql
spec:
  serviceName: vut-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: vut
      app.kubernetes.io/component: database
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: vut
        app.kubernetes.io/component: database
        app.kubernetes.io/name: postgresql
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgresql
          image: postgres:16-alpine
          imagePullPolicy: Never  # For local dev (minikube/kind)
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: vut_readmodel
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: vut-postgresql-secret
                  key: username
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: vut-postgresql-secret
                  key: password
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - vut_app
                - -d
                - vut_readmodel
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - vut_app
                - -d
                - vut_readmodel
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: init-scripts
          configMap:
            name: vut-postgresql-init
            defaultMode: 0444
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: vut
          app.kubernetes.io/component: database
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
---
# ConfigMap for PostgreSQL init SQL
apiVersion: v1
kind: ConfigMap
metadata:
  name: vut-postgresql-init
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: database
data:
  01-init-db.sql: |
    -- User projection
    CREATE TABLE IF NOT EXISTS user_projection (
        user_id       UUID PRIMARY KEY,
        provider_id   TEXT NOT NULL UNIQUE,
        display_name  TEXT NOT NULL,
        avatar_url    TEXT,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Organization projection
    CREATE TABLE IF NOT EXISTS org_projection (
        org_id        UUID PRIMARY KEY,
        name          TEXT NOT NULL,
        is_deleted    BOOLEAN NOT NULL DEFAULT FALSE,
        created_at    TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        updated_at    TIMESTAMPTZ NOT NULL DEFAULT NOW()
    );

    -- Organization member projection
    CREATE TABLE IF NOT EXISTS org_member_projection (
        org_id        UUID NOT NULL REFERENCES org_projection(org_id),
        user_id       UUID NOT NULL REFERENCES user_projection(user_id),
        role          TEXT NOT NULL CHECK (role IN ('Owner', 'Member')),
        joined_at     TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (org_id, user_id)
    );

    -- Organization invitation projection
    CREATE TABLE IF NOT EXISTS org_invitation_projection (
        org_id            UUID NOT NULL REFERENCES org_projection(org_id),
        email             TEXT NOT NULL,
        role              TEXT NOT NULL CHECK (role IN ('Owner', 'Member')),
        status            TEXT NOT NULL CHECK (status IN ('Pending', 'Accepted', 'Declined')),
        invited_at        TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        user_id           UUID,
        PRIMARY KEY (org_id, email)
    );

    -- User organization membership (reverse index)
    CREATE TABLE IF NOT EXISTS user_org_projection (
        user_id       UUID NOT NULL REFERENCES user_projection(user_id),
        org_id        UUID NOT NULL REFERENCES org_projection(org_id),
        role          TEXT NOT NULL,
        PRIMARY KEY (user_id, org_id)
    );

    -- Projection checkpoint table
    CREATE TABLE IF NOT EXISTS projection_checkpoint (
        projector_name   TEXT NOT NULL,
        topic            TEXT NOT NULL,
        partition_id     INT NOT NULL,
        last_offset      BIGINT NOT NULL DEFAULT 0,
        updated_at       TIMESTAMPTZ NOT NULL DEFAULT NOW(),
        PRIMARY KEY (projector_name, topic, partition_id)
    );

    -- Indexes
    CREATE INDEX IF NOT EXISTS idx_user_projection_provider ON user_projection(provider_id);
    CREATE INDEX IF NOT EXISTS idx_org_member_projection_user ON org_member_projection(user_id);
    CREATE INDEX IF NOT EXISTS idx_org_invitation_projection_email ON org_invitation_projection(email, status);
    CREATE INDEX IF NOT EXISTS idx_user_org_projection_org ON user_org_projection(org_id);

apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: velucid-postgresql
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: database
    app.kubernetes.io/name: postgresql
spec:
  serviceName: velucid-postgresql
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: velucid
      app.kubernetes.io/component: database
      app.kubernetes.io/name: postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: velucid
        app.kubernetes.io/component: database
        app.kubernetes.io/name: postgresql
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: postgresql
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgresql
              containerPort: 5432
              protocol: TCP
          env:
            - name: POSTGRES_DB
              value: velucid_readmodel
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: velucid-postgresql-secret
                  key: POSTGRES_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velucid-postgresql-secret
                  key: POSTGRES_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - velucid_app
                - -d
                - velucid_readmodel
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - velucid_app
                - -d
                - velucid_readmodel
            initialDelaySeconds: 15
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      # No init SQL ConfigMap — read model schema is managed by the application
      # via code-first migrations (EF Core). PostgreSQL only creates the empty
      # database via POSTGRES_DB env var; tables are created at app startup.
      volumeClaimTemplates:
        - metadata:
            name: data
            labels:
              app.kubernetes.io/part-of: velucid
              app.kubernetes.io/component: database
          spec:
            accessModes: ["ReadWriteOnce"]
            storageClassName: local-path
            resources:
              requests:
                storage: 5Gi

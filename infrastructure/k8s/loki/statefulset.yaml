apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: velucid-loki
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: loki
spec:
  serviceName: velucid-loki
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: velucid
      app.kubernetes.io/component: observability
      app.kubernetes.io/name: loki
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: velucid
        app.kubernetes.io/component: observability
        app.kubernetes.io/name: loki
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: loki
          image: grafana/loki:3.0.0
          imagePullPolicy: IfNotPresent
          args:
            - -config.file=/etc/loki/loki.yaml
          ports:
            - name: http
              containerPort: 3100
              protocol: TCP
            - name: grpc
              containerPort: 9096
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/loki
            - name: data
              mountPath: /var/loki
          resources:
            requests:
              cpu: 100m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 3100
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: velucid-loki-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: velucid
          app.kubernetes.io/component: observability
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
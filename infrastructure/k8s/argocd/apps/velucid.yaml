# Velucid app — lives in the velucid namespace; uses the velucid Infisical project.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velucid
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: velucid
spec:
  project: apps
  source:
    repoURL: https://github.com/lekhasy/Velucid
    targetRevision: main
    path: infrastructure/k8s
    directory:
      recurse: true
      exclude: "argocd/*"
  destination:
    server: https://kubernetes.default.svc
    namespace: velucid
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
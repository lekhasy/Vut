# App-of-Apps root.
# Watches infrastructure/k8s/argocd/apps/ — each .yaml file there is a leaf
# ArgoCD Application that deploys one platform service or one app.
#
# To add a new app: drop a new .yaml file in infrastructure/k8s/argocd/apps/
# pointing at the new repo + namespace, and add the repo + destination to
# appproject-apps.yaml.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: platform
spec:
  project: platform
  source:
    repoURL: https://github.com/lekhasy/Vut
    targetRevision: main
    path: infrastructure/k8s/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true
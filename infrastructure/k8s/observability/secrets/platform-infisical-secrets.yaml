# Platform-observability secret sync — pulls secrets from Infisical Cloud and
# creates K8s secrets in the platform-observability namespace automatically.
#
# This namespace is shared by all apps on the cluster, so each Infisical project
# is owned by the platform, not by a single app.
#
# Prerequisites:
#   1. Infisical Operator installed in K3s (done by k3s-start.sh)
#   2. A "platform" project in Infisical Cloud with environment "prod"
#   3. A Machine Identity for the platform project, credentials stored in K8s:
#      sudo k3s kubectl create secret generic infisical-machine-identity \
#        -n platform-observability \
#        --from-literal=clientId=<PLATFORM_MACHINE_IDENTITY_CLIENT_ID> \
#        --from-literal=clientSecret=<PLATFORM_MACHINE_IDENTITY_CLIENT_SECRET>
#
# Expected Infisical secret keys (Production environment, root path /):
#   GRAFANA_ADMIN_PASSWORD

---
# Grafana admin password → platform-grafana-secret
apiVersion: secrets.infisical.com/v1alpha1
kind: InfisicalSecret
metadata:
  name: platform-grafana
  namespace: platform-observability
  labels:
    app.kubernetes.io/part-of: platform-observability
    app.kubernetes.io/component: secrets
spec:
  hostAPI: https://app.infisical.com/api
  resyncInterval: 60
  authentication:
    universalAuth:
      credentialsRef:
        secretName: infisical-machine-identity
        secretNamespace: platform-observability
      secretsScope:
        projectSlug: platform
        envSlug: prod
        secretsPath: /
  managedSecretReference:
    secretName: platform-grafana-secret
    secretNamespace: platform-observability
    secretType: Opaque
    creationPolicy: Owner
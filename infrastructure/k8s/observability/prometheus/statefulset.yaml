apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: platform-prometheus
  namespace: platform-observability
  labels:
    app.kubernetes.io/part-of: platform-observability
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: prometheus
spec:
  serviceName: platform-prometheus
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: platform-observability
      app.kubernetes.io/component: observability
      app.kubernetes.io/name: prometheus
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: platform-observability
        app.kubernetes.io/component: observability
        app.kubernetes.io/name: prometheus
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.2
          imagePullPolicy: IfNotPresent
          args:
            - --config.file=/etc/prometheus/prometheus.yaml
            - --storage.tsdb.path=/var/prometheus/data
            - --storage.tsdb.retention.time=15d
            - --storage.tsdb.retention.size=5GB
            - --web.enable-lifecycle
          ports:
            - name: http
              containerPort: 9090
              protocol: TCP
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /var/prometheus
          resources:
            requests:
              cpu: 250m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 4Gi
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
      volumes:
        - name: config
          configMap:
            name: platform-prometheus-config
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: platform-observability
          app.kubernetes.io/component: observability
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi
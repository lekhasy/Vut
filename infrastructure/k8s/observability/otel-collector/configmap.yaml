apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-otel-collector-config
  namespace: platform-observability
  labels:
    app.kubernetes.io/part-of: platform-observability
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: otel-collector
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Collect container logs from all velucid pods
      filelog:
        include: ["/var/log/pods/*/*/*.log"]
        start_at: end
        include_file_path: true
        include_file_name: false
        operators:
          # Parse the K8s log file path to extract pod metadata
          # Path format: /var/log/pods/<namespace>_<pod-name>_<pod-uid>/<container>/<N>.log
          - type: regex_parser
            id: extract_metadata_from_filepath
            regex: '^.*\/var\/log\/pods\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]+)\/(?P<container_name>[^\/_]+)\/(?P<restart_count>\d+)\.log$'
            parse_from: attributes["log.file.path"]
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod_name
            to: resource["k8s.pod.name"]
          - type: move
            from: attributes.container_name
            to: resource["k8s.container.name"]
          - type: move
            from: attributes.uid
            to: resource["k8s.pod.uid"]
          - type: remove
            field: attributes.restart_count
          # Parse CRI log format: <timestamp> <stream> <flags> <message>
          - type: regex_parser
            id: parse_cri_format
            regex: '^(?P<time>[^ ]+) (?P<stream>stdout|stderr) (?P<flags>[^ ]+) (?P<message>.*)$'
            parse_from: body
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.999999999Z07:00'
          - type: move
            from: attributes.message
            to: body
          - type: move
            from: attributes.stream
            to: attributes["log.iostream"]
          - type: remove
            field: attributes.time
          - type: remove
            field: attributes.flags

    # NOTE: kubeletstats is commented out due to two issues:
      # 1. hostNetwork:true is required to reach kubelet API on localhost:10250, but this
      #    causes the pod to use the host's DNS resolver, making cluster DNS names (like
      #    platform-loki) unresolvable from within the pod.
      # 2. Even with hostNetwork, the default ServiceAccount lacks 'nodes/stats' permission
      #    (403 Forbidden). A ClusterRoleBinding for 'nodes/stats' get/list would fix it,
      #    but DNS resolution from hostNetwork pods remains broken.
      #
      # For cluster-level metrics, Prometheus is configured to scrape K3s kubelet directly
      # via kubernetes-apiservers/nodes jobs in prometheus.yaml. Use that instead.
      #
      # kubeletstats:
      #   collection_interval: 30s
      #   auth_type: serviceAccount
      #   endpoint: https://localhost:10250
      #   insecure_skip_verify: true
      #   extra_metadata_labels:
      #     - container.id
      #   metric_groups:
      #     - node
      #     - pod
      #     - container

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1000

      memory_limiter:
        check_interval: 1s
        limit_percentage: 75

      k8sattributes:
        auth_type: "serviceAccount"
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.namespace.name
            - k8s.deployment.name
          labels:
            - key: app.kubernetes.io/name
              from: pod
              tag_name: service.name
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.name

      # Tell the Loki exporter which resource attributes to promote to Loki stream labels
      resource/loki:
        attributes:
          - action: insert
            key: loki.resource.labels
            value: "service.name, k8s.namespace.name, k8s.pod.name, k8s.container.name, k8s.deployment.name"

      # Tell the Loki exporter to use the body as-is (not JSON-wrap the whole record)
      attributes/loki:
        actions:
          - action: insert
            key: loki.format
            value: raw

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133
        path: /health

    exporters:
      loki:
        endpoint: "http://platform-loki:3100/loki/api/v1/push"
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 5m

      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: platform-observability
        const_labels:
          cluster: velucid

      otlp:
        endpoint: "platform-tempo:4317"

    service:
      extensions: [health_check]
      pipelines:
        logs:
          receivers: [filelog]
          processors: [memory_limiter, k8sattributes, resource/loki, attributes/loki, batch]
          exporters: [loki]

        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, batch]
          exporters: [otlp]
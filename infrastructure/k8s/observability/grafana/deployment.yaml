apiVersion: apps/v1
kind: Deployment
metadata:
  name: platform-grafana
  namespace: platform-observability
  labels:
    app.kubernetes.io/part-of: platform-observability
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: grafana
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app.kubernetes.io/part-of: platform-observability
      app.kubernetes.io/component: observability
      app.kubernetes.io/name: grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: platform-observability
        app.kubernetes.io/component: observability
        app.kubernetes.io/name: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: "admin"
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: platform-grafana-secret
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.velucid.app"
            - name: GF_SERVER_DOMAIN
              value: "grafana.velucid.app"
          volumeMounts:
            - name: config
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: platform-grafana-datasources-datasource
        - name: dashboard-provider
          configMap:
            name: platform-grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: platform-grafana-dashboard-overview

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-grafana-datasources-datasource
  namespace: platform-observability
  labels:
    app.kubernetes.io/part-of: platform-observability
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: grafana
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://platform-prometheus:9090
        isDefault: true
        editable: false
      - name: Loki
        type: loki
        access: proxy
        url: http://platform-loki:3100
        editable: false
      - name: Tempo
        type: tempo
        access: proxy
        url: http://platform-tempo:3100
        editable: false
        jsonData:
          httpMethod: GET
          tracesToLogs:
            datasourceUid: Loki
          nodeGraph:
            enabled: true
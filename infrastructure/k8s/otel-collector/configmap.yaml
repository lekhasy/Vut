apiVersion: v1
kind: ConfigMap
metadata:
  name: velucid-otel-collector-config
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: otel-collector
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # Collect container logs from all velucid pods
      filelog:
        include: ["/var/log/pods/*/*/*.log"]
        start_at: end

      # Collect kubelet metrics (node, pod, container stats)
      kubeletstats:
        collection_interval: 30s
        auth_type: serviceAccount
        endpoint: https://localhost:10250
        insecure_skip_verify: true
        extra_metadata_labels:
          - container.id
        metric_groups:
          - node
          - pod
          - container

    processors:
      batch:
        timeout: 10s
        send_batch_size: 1000

      memory_limiter:
        check_interval: 1s
        limit_percentage: 75

      k8sattributes:
        passthrough: true

    exporters:
      loki:
        endpoint: "http://velucid-loki:3100/loki/api/v1/push"
        retry_on_failure:
          enabled: true
          initial_interval: 1s
          max_interval: 30s
          max_elapsed_time: 5m

      prometheus:
        endpoint: "0.0.0.0:8889"
        namespace: velucid
        const_labels:
          cluster: velucid

    service:
      pipelines:
        logs:
          receivers: [filelog]
          processors: [memory_limiter, batch, k8sattributes]
          exporters: [loki]

        metrics:
          receivers: [kubeletstats]
          processors: [memory_limiter, batch]
          exporters: [prometheus]

        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch, k8sattributes]
          exporters: [otlp]
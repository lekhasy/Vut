apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: velucid-otel-collector
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: otel-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: velucid
      app.kubernetes.io/component: observability
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: velucid
        app.kubernetes.io/component: observability
        app.kubernetes.io/name: otel-collector
      annotations:
        reloader.stakater.com/auto: "true"
    spec:
      # hostNetwork: true was previously needed for kubeletstats (kubelet API on localhost:10250).
      # DISABLED: hostNetwork pods use the host's DNS resolver, breaking cluster DNS resolution.
      # See configmap.yaml kubeletstats comment for full details.
      # hostNetwork: true
      terminationGracePeriodSeconds: 30
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.102.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otel-collector-config.yaml
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel-collector-config.yaml
              subPath: otel-collector-config.yaml
            - name: varlog
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          ports:
            - name: metrics
              containerPort: 8889
              protocol: TCP
            - name: health
              containerPort: 13133
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: otel-config
          configMap:
            name: velucid-otel-collector-config
        - name: varlog
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
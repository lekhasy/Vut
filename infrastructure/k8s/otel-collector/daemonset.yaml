apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: velucid-otel-collector
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: otel-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/part-of: velucid
      app.kubernetes.io/component: observability
      app.kubernetes.io/name: otel-collector
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: velucid
        app.kubernetes.io/component: observability
        app.kubernetes.io/name: otel-collector
    spec:
      # hostNetwork: true is required for kubeletstats receiver to reach kubelet API on each node.
      # Without it, the kubelet API is only accessible from the node's network namespace.
      #
      # Trade-offs:
      # PRO: OTEL DaemonSet can scrape kubelet metrics (node CPU, memory, network, volumes) directly.
      # PRO: OTEL becomes the single source of truth for all metrics, traces, and logs.
      #
      # CON: Pod uses node's network namespace directly — may conflict with host port mappings
      #      from other Daemonsets or node-level services on the same port.
      # CON: Each pod gets the node's IP. If you run other hostNetwork pods, port conflicts possible.
      # CON: Network policies scoped to namespace won't apply to host network traffic.
      hostNetwork: true
      terminationGracePeriodSeconds: 30
      containers:
        - name: otel-collector
          image: otel/opentelemetry-collector-contrib:0.102.0
          imagePullPolicy: IfNotPresent
          args:
            - --config=/etc/otel-collector-config.yaml
          volumeMounts:
            - name: otel-config
              mountPath: /etc/otel-collector-config.yaml
              subPath: otel-collector-config.yaml
            - name: varlog
              mountPath: /var/log/pods
              readOnly: true
            - name: containers
              mountPath: /var/lib/docker/containers
              readOnly: true
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          ports:
            - name: metrics
              containerPort: 8889
              protocol: TCP
            - name: prometheus
              containerPort: 8888
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /health
              port: 13133
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 13133
            initialDelaySeconds: 30
            periodSeconds: 15
      volumes:
        - name: otel-config
          configMap:
            name: velucid-otel-collector-config
        - name: varlog
          hostPath:
            path: /var/log/pods
        - name: containers
          hostPath:
            path: /var/lib/docker/containers
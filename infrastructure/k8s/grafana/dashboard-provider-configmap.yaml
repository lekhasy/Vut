apiVersion: v1
kind: ConfigMap
metadata:
  name: velucid-grafana-dashboard-provider
  namespace: velucid
  labels:
    app.kubernetes.io/part-of: velucid
    app.kubernetes.io/component: observability
    app.kubernetes.io/name: grafana
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: Velucid Dashboards
        orgId: 1
        folder: Velucid
        folderUid: velucid
        type: file
        disableReloadPath: false
        updateIntervalSeconds: 30
        allowUpdates: true
        options:
          path: /var/lib/grafana/dashboards

apiVersion: batch/v1
kind: Job
metadata:
  name: vut-redpanda-topic-init
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: messaging
    app.kubernetes.io/name: redpanda-topic-init
  annotations:
    # This job should only run once. Delete it after success if you need to re-run.
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 5
  template:
    metadata:
      name: vut-redpanda-topic-init
      labels:
        app.kubernetes.io/part-of: vut
        app.kubernetes.io/component: messaging
        app.kubernetes.io/name: redpanda-topic-init
    spec:
      restartPolicy: OnFailure
      containers:
        - name: topic-init
          image: redpandadata/redpanda:v24.2.2
          imagePullPolicy: Never
          command:
            - bash
            - -c
            - |
              set -ex

              BROKER="vut-redpanda:9092"

              echo "Waiting for Redpanda to be ready..."
              for i in $(seq 1 60); do
                if rpk cluster info --brokers "$BROKER" > /dev/null 2>&1; then
                  echo "Redpanda is ready."
                  break
                fi
                echo "Attempt $i/60: Redpanda not ready, waiting 2s..."
                sleep 2
              done

              if ! rpk cluster info --brokers "$BROKER" > /dev/null 2>&1; then
                echo "ERROR: Redpanda did not become ready in time."
                exit 1
              fi

              echo "Creating topics..."

              # vut.user-events (3 partitions)
              if rpk topic describe vut.user-events --brokers "$BROKER" > /dev/null 2>&1; then
                echo "Topic vut.user-events already exists."
              else
                rpk topic create vut.user-events \
                  --partitions 3 \
                  --replication-factor 1 \
                  --brokers "$BROKER"
                echo "Created topic vut.user-events (3 partitions)."
              fi

              # vut.org-events (6 partitions)
              if rpk topic describe vut.org-events --brokers "$BROKER" > /dev/null 2>&1; then
                echo "Topic vut.org-events already exists."
              else
                rpk topic create vut.org-events \
                  --partitions 6 \
                  --replication-factor 1 \
                  --brokers "$BROKER"
                echo "Created topic vut.org-events (6 partitions)."
              fi

              echo "Topic initialization complete."
              echo ""
              echo "Topic list:"
              rpk topic list --brokers "$BROKER"

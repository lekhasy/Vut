apiVersion: v1
kind: Service
metadata:
  name: vut-redpanda
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: messaging
    app.kubernetes.io/name: redpanda
spec:
  type: ClusterIP
  ports:
    - name: kafka
      port: 9092
      targetPort: 9092
      protocol: TCP
    - name: admin
      port: 9644
      targetPort: 9644
      protocol: TCP
  selector:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: messaging
    app.kubernetes.io/name: redpanda

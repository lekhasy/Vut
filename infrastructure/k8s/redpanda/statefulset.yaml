apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vut-redpanda
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: messaging
    app.kubernetes.io/name: redpanda
spec:
  serviceName: vut-redpanda
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/part-of: vut
      app.kubernetes.io/component: messaging
      app.kubernetes.io/name: redpanda
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: vut
        app.kubernetes.io/component: messaging
        app.kubernetes.io/name: redpanda
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: redpanda
          image: redpandadata/redpanda:v24.2.2
          imagePullPolicy: Never  # For local dev (minikube/kind)
          ports:
            - name: kafka
              containerPort: 9092
              protocol: TCP
            - name: admin
              containerPort: 9644
              protocol: TCP
          command:
            - redpanda
            - start
            - --smp 1
            - --memory 512M
            - --overprovisioned
            - --kafka-addr internal://0.0.0.0:9092
            - --advertise-kafka-addr
            - $(POD_IP):9092
            - --pandaproxy-addr internal://0.0.0.0:8082
            - --advertise-pandaproxy-addr
            - $(POD_IP):8082
            - --rpc-addr internal://0.0.0.0:33145
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /var/lib/redpanda/data
          readinessProbe:
            httpGet:
              path: /v1/cluster/health
              port: 9644
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /v1/cluster/health
              port: 9644
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: vut
          app.kubernetes.io/component: messaging
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi

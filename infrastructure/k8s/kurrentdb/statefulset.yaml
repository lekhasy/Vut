apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vut-kurrentdb
  namespace: vut
  labels:
    app.kubernetes.io/part-of: vut
    app.kubernetes.io/component: eventstore
    app.kubernetes.io/name: kurrentdb
spec:
  serviceName: vut-kurrentdb
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/part-of: vut
      app.kubernetes.io/component: eventstore
      app.kubernetes.io/name: kurrentdb
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: vut
        app.kubernetes.io/component: eventstore
        app.kubernetes.io/name: kurrentdb
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: kurrentdb
          image: kurrentplatform/kurrentdb:26.1.0
          imagePullPolicy: Never  # Images pre-loaded into K3s
          ports:
            - name: http
              containerPort: 2113
              protocol: TCP
            - name: tcp
              containerPort: 1113
              protocol: TCP
          env:
            - name: EVENTSTORE_CLUSTER_SIZE
              value: "1"
            - name: EVENTSTORE_RUN_PROJECTIONS
              value: "None"
            - name: EVENTSTORE_DB
              value: "/data/db"
            - name: EVENTSTORE_DEV
              value: "true"
            - name: EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP
              value: "true"
            - name: EVENTSTORE_INSECURE
              value: "true"
            - name: EVENTSTORE_INT_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: EVENTSTORE_EXT_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          resources:
            requests:
              cpu: 500m
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 2113
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 2113
            initialDelaySeconds: 45
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
  volumeClaimTemplates:
    - metadata:
        name: data
        labels:
          app.kubernetes.io/part-of: vut
          app.kubernetes.io/component: eventstore
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 10Gi

# VUT Platform - Development Overrides (AMD64 / x86_64)
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.amd64.yml --env-file .env.dev up -d
#
# All images run natively on x86_64. No emulation needed.

services:
  kurrentdb:
    environment:
      EVENTSTORE_CLUSTER_SIZE: "1"
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  redpanda:
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 1G
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9092
      - --pandaproxy-addr internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://redpanda:8082
      - --rpc-addr internal://0.0.0.0:33145
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  postgresql:
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

# Velucid Platform - Development Overrides (AMD64 / x86_64)
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.amd64.yml --env-file .env.dev up -d
#
# All images run natively on x86_64. No emulation needed.

services:
  kurrentdb:
    # Run as root to avoid "/home/kurrent permission denied" on WSL/Linux.
    # The kurrent user (UID 1001) can't write to its home dir on some filesystems.
    user: "0:0"
    environment:
      EVENTSTORE_CLUSTER_SIZE: "1"
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  postgresql:
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

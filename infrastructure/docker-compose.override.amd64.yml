# VUT Platform - Development Overrides (AMD64 / x86_64)
# Usage: docker compose -f docker-compose.yml -f docker-compose.override.amd64.yml --env-file .env.dev up -d
#
# All images run natively on x86_64. No emulation needed.

services:
  kurrentdb:
    environment:
      EVENTSTORE_CLUSTER_SIZE: "1"
    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 1G

  postgresql:
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

# VUT Platform - Staging Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file .env.staging up -d

services:
  kurrentdb:
    environment:
      EVENTSTORE_CLUSTER_SIZE: "1"
      EVENTSTORE_DEV: "true"
      EVENTSTORE_INSECURE: "true"
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  postgresql:
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  silo:
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  projector-service:
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  frontend:
    environment:
      NODE_ENV: staging
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

# VUT Platform - Staging Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.staging.yml --env-file .env.staging up -d

services:
  kurrentdb:
    environment:
      EVENTSTORE_CLUSTER_SIZE: "1"
      EVENTSTORE_DEV: "true"
      EVENTSTORE_INSECURE: "true"
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 2G

  redpanda:
    command:
      - redpanda
      - start
      - --smp 2
      - --memory 2G
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9092
      - --pandaproxy-addr internal://0.0.0.0:8082
      - --advertise-pandaproxy-addr internal://redpanda:8082
      - --rpc-addr internal://0.0.0.0:33145
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  postgresql:
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  actor-service:
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

  frontend:
    environment:
      NODE_ENV: staging
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 256M

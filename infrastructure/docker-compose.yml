  # ─── pgAdmin (PostgreSQL management UI) ─────────────────────────
  pgadmin:
    image: dpage/pgadmin4:8.14
    container_name: vut-pgadmin
    restart: unless-stopped
    ports:
      - "${PGADMIN_PORT:-8081}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@vut.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${PGADMIN_MEMORY_LIMIT:-512M}
        reservations:
          memory: ${PGADMIN_MEMORY_RESERVATION:-128M}

volumes:
  kurrentdb-data:
    name: vut-kurrentdb-data
  postgresql-data:
    name: vut-postgresql-data
  pgadmin-data:
    name: vut-pgadmin-data

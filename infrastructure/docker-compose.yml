# VUT Platform - Base Docker Compose Configuration
# Usage: docker compose up -d
# Environment overrides are loaded automatically based on VUT_ENV:
#   - VUT_ENV=dev (default): loads docker-compose.override.yml
#   - VUT_ENV=staging: loads docker-compose.staging.yml
#   - VUT_ENV=prod: loads docker-compose.prod.yml

services:
  # ─── KurrentDB (EventStoreDB) ───────────────────────────────────
  kurrentdb:
    image: kurrentplatform/kurrentdb:26.1.0
    container_name: vut-kurrentdb
    restart: unless-stopped
    ports:
      - "${KURRENTDB_HTTP_PORT:-2113}:2113"
      - "${KURRENTDB_TCP_PORT:-1113}:1113"
    environment:
      EVENTSTORE_CLUSTER_SIZE: ${KURRENTDB_CLUSTER_SIZE:-1}
      EVENTSTORE_RUN_PROJECTIONS: "None"
      EVENTSTORE_DB: /data/db
      EVENTSTORE_DEV: "true"
      EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP: "true"
      EVENTSTORE_INSECURE: "true"
    volumes:
      - kurrentdb-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2113/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${KURRENTDB_MEMORY_LIMIT:-3G}
        reservations:
          memory: ${KURRENTDB_MEMORY_RESERVATION:-1G}

  # ─── PostgreSQL (Read Model Store + Orleans Clustering) ────────
  postgresql:
    image: postgres:16-alpine
    container_name: vut-postgresql
    restart: unless-stopped
    ports:
      - "${POSTGRESQL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: vut_readmodel
      POSTGRES_USER: ${POSTGRESQL_USER:-vut_app}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD:-vut_dev_password}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      # No SQL init scripts — read model schema is managed by the application
      # via code-first migrations (EF Core). PostgreSQL only creates the empty
      # database via POSTGRES_DB env var; tables are created at app startup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER:-vut_app} -d vut_readmodel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: ${POSTGRESQL_MEMORY_LIMIT:-2G}
        reservations:
          memory: ${POSTGRESQL_MEMORY_RESERVATION:-512M}


# Velucid Platform - Docker Compose (Local Development Only)
# For staging/production, use K3s + ArgoCD (see docs/new-machine-setup.md).
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.override.<arch>.yml --env-file .env.dev up -d
#   Or simply: ./scripts/start.sh

services:
  # ─── KurrentDB (EventStoreDB) ───────────────────────────────────
  kurrentdb:
    image: kurrentplatform/kurrentdb:26.1.0
    container_name: velucid-kurrentdb
    restart: unless-stopped
    ports:
      - "${KURRENTDB_HTTP_PORT:-2113}:2113"
      - "${KURRENTDB_TCP_PORT:-1113}:1113"
    environment:
      EVENTSTORE_CLUSTER_SIZE: ${KURRENTDB_CLUSTER_SIZE:-1}
      EVENTSTORE_RUN_PROJECTIONS: "None"
      EVENTSTORE_DB: /data/db
      EVENTSTORE_DEV: "true"
      EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP: "true"
      EVENTSTORE_INSECURE: "true"
    volumes:
      - kurrentdb-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2113/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${KURRENTDB_MEMORY_LIMIT:-3G}
        reservations:
          memory: ${KURRENTDB_MEMORY_RESERVATION:-1G}

  # ─── PostgreSQL (Read Model Store + Orleans Clustering) ────────
  postgresql:
    image: postgres:16-alpine
    container_name: velucid-postgresql
    restart: unless-stopped
    ports:
      - "${POSTGRESQL_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: velucid_readmodel
      POSTGRES_USER: ${POSTGRESQL_USER:-velucid_app}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD:-velucid_dev_password}
    volumes:
      - postgresql-data:/var/lib/postgresql/data
      # No SQL init scripts — read model schema is managed by the application
      # via code-first migrations (EF Core). PostgreSQL only creates the empty
      # database via POSTGRES_DB env var; tables are created at app startup.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRESQL_USER:-velucid_app} -d velucid_readmodel"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: ${POSTGRESQL_MEMORY_LIMIT:-2G}
        reservations:
          memory: ${POSTGRESQL_MEMORY_RESERVATION:-512M}

  # ─── OpenFGA (Centralized Authorization) ───────────────────────
  openfga:
    image: openfga/openfga:latest
    container_name: velucid-openfga
    restart: unless-stopped
    ports:
      - "${OPENFGA_PORT:-8080}:8080"
      - "${OPENFGA_GRPC_PORT:-8081}:8081"
    environment:
      OPENFGA_LOG_LEVEL: debug
      OPENFGA_TRACING_ENABLED: "false"
      OPENFGA_DATASTORE_ENGINE: postgres
      OPENFGA_DATASTORE_URI: postgres://velucid_app:velucid_dev_password@postgresql:5432/velucid_openfga?sslmode=disable
    depends_on:
      postgresql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: ${OPENFGA_MEMORY_LIMIT:-512M}
        reservations:
          memory: ${OPENFGA_MEMORY_RESERVATION:-128M}


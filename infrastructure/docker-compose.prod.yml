# VUT Platform - Production Overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml --env-file .env.prod up -d
#
# NOTE: For true production, use the K8s manifests in k8s/ with K3s.
#       This compose file is for single-machine production fallback.

services:
  kurrentdb:
    environment:
      EVENTSTORE_CLUSTER_SIZE: "1"
      EVENTSTORE_DEV: "false"
      EVENTSTORE_INSECURE: "true"
      EVENTSTORE_ENABLE_ATOM_PUB_OVER_HTTP: "true"
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G

  postgresql:
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 2G

  actor-service:
    environment:
      ASPNETCORE_ENVIRONMENT: Production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G

  frontend:
    environment:
      NODE_ENV: production
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

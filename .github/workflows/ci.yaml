# Velucid Platform — CI/CD Pipeline
#
# Pipeline order:
#   1. nx-verify      — Bun + Nx: format check, lint, typecheck, unit tests
#   2. build-silo     — .NET 10 Orleans silo (context: backend/src, Dockerfile in
#                        Velucid.Silo). apps/silo is an Nx wrapper; the image
#                        still builds from the legacy Dockerfile until 4.5
#                        consolidates everything under apps/silo.
#   3. build-projector — TypeScript projector (Fastify + Bun). Replaces the
#                        .NET projector-service image. The k8s deployment's main
#                        container is repointed to this image in update-manifests.
#                        The old projector-service Dockerfile stays in the repo
#                        untouched until 4.5 deletes it.
#   4. build-migrations — Drizzle/EF migrations image (unchanged from before the
#                        monorepo migration).
#   5. build-web      — Astro SSR web client (was `frontend/` pre-4.0).
#   6. update-manifests — rewrites the new image tags into the k8s deployment
#                        files so ArgoCD picks them up.
#
# Triggers on pushes to main that change apps, libs, backend, or infra.
# Uses the built-in GITHUB_TOKEN for ghcr.io auth (no extra secrets needed).

name: CI

on:
  push:
    branches: [main]
    paths:
      - 'apps/**'
      - 'libs/**'
      - 'backend/**'
      - 'infrastructure/**'
      - '.github/workflows/ci.yaml'
      - 'package.json'
      - 'bun.lock'
      - 'nx.json'
      - 'tsconfig.base.json'
      - 'eslint.config.cjs'
      - '.prettierrc'
      - '.prettierignore'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/lekhasy/vut

permissions:
  contents: write
  packages: write

jobs:
  # ── Nx verify: format / lint / typecheck / unit tests ───────────────
  nx-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      # Pre-warm dotnet's first-time-config serially before Nx fans out
      # parallel `dotnet build` / `dotnet test` / `dotnet format` calls.
      # Without this, fresh runners race on the `NuGet-Migrations` named
      # mutex and the build aborts with EEXIST on the per-session shm dir:
      #   System.IO.IOException: The system cannot open the device or file
      #   specified. : 'NuGet-Migrations'.
      # Mirrors the pre-warm in scripts/hooks/pre-push so local and CI agree.
      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Pre-warm dotnet first-time-config
        run: dotnet --info > /dev/null

      - name: Format check
        run: bunx nx format:check

      - name: Lint, typecheck, and test
        # `--exclude web` keeps the Playwright e2e suite out of nx-verify — it
        # needs a live Auth0 + silo + KurrentDB + Postgres stack that a fresh
        # runner doesn't have. Unit tests (silo's dotnet test, projector's
        # bun test, the 4 lib smoke tests) still run. The web e2e suite gets
        # its own infra job in Story 4.6.
        run: bunx nx run-many -t lint typecheck test --parallel --exclude web

  # ── Build & push silo image (.NET 10) ───────────────────────────────
  build-silo:
    needs: [nx-verify]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/silo
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend/src
          file: backend/src/Velucid.Silo/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build & push projector image (TypeScript / Bun / Fastify) ───────
  # The .NET projector-service image is intentionally not built anymore —
  # the k8s deployment's main container is repointed at this new TS image
  # (see update-manifests → Update projector image tag below). The legacy
  # .NET projector-service source under backend/src/Velucid.ProjectorService
  # is left in the tree untouched for reference and is deleted in 4.5.
  build-projector:
    needs: [nx-verify]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/projector
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        # Build context is the repo root because apps/projector/Dockerfile
        # copies the workspace-root `package.json` + `bun.lock` first
        # (so `bun install --frozen-lockfile` resolves the workspace) and
        # then copies `apps/projector/` under that. A narrower context
        # (e.g. `apps/projector`) breaks the COPY paths.
        with:
          context: .
          file: apps/projector/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build & push migrations image ───────────────────────────────────
  build-migrations:
    needs: [nx-verify]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/migrations
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: backend/src
          file: backend/src/Velucid.ReadModel.Migrations/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Build & push web image (Astro SSR) ──────────────────────────────
  build-web:
    needs: [nx-verify]
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_PREFIX }}/web
          tags: |
            type=sha,prefix=
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v6
        # Build context is the repo root for the same reason as the
        # projector build above — apps/web/Dockerfile copies the
        # workspace-root `package.json` + `bun.lock` first, then
        # `apps/web/` under that. A narrower context breaks the COPY paths.
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ── Update K8s manifests with new image tags ────────────────────────
  update-manifests:
    runs-on: ubuntu-latest
    needs: [build-silo, build-projector, build-migrations, build-web]
    if: always() && (needs.build-silo.result == 'success' || needs.build-projector.result == 'success' || needs.build-migrations.result == 'success' || needs.build-web.result == 'success')
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update silo image tag
        if: needs.build-silo.result == 'success'
        run: |
          SHA="${GITHUB_SHA::7}"
          sed -i "s|image: ghcr.io/lekhasy/vut/silo:.*|image: ghcr.io/lekhasy/vut/silo:${SHA}|" \
            infrastructure/k8s/silo/deployment.yaml

      - name: Update projector image tag (main container)
        if: needs.build-projector.result == 'success'
        run: |
          SHA="${GITHUB_SHA::7}"
          # The main container in the projector-service deployment is now
          # the new TypeScript `projector` image (replaces the .NET
          # projector-service image). The init container (migrations)
          # below is updated by the migrations step.
          sed -i "s|image: ghcr.io/lekhasy/vut/projector:.*|image: ghcr.io/lekhasy/vut/projector:${SHA}|" \
            infrastructure/k8s/projector-service/deployment.yaml

      - name: Update migrations image tag
        if: needs.build-migrations.result == 'success'
        run: |
          SHA="${GITHUB_SHA::7}"
          sed -i "s|image: ghcr.io/lekhasy/vut/migrations:.*|image: ghcr.io/lekhasy/vut/migrations:${SHA}|" \
            infrastructure/k8s/projector-service/deployment.yaml

      - name: Update web image tag
        if: needs.build-web.result == 'success'
        run: |
          SHA="${GITHUB_SHA::7}"
          # The frontend deployment file is unchanged in name; the image
          # inside it switches from `frontend:` to `web:`. The deployment
          # resource (velucid-frontend) keeps its name until 4.5 renames it.
          sed -i "s#image: ghcr.io/lekhasy/vut/\(frontend\|web\):.*#image: ghcr.io/lekhasy/vut/web:${SHA}#" \
            infrastructure/k8s/frontend/deployment.yaml

      - name: Commit manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add infrastructure/k8s/
          git diff --cached --quiet && echo "No manifest changes" && exit 0
          git commit -m "ci: update image tags to ${GITHUB_SHA::7}"
          git push
